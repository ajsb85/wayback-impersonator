name: Deploy Debian Repo

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust & cargo-deb
        run: |
          rustup update stable
          cargo install cargo-deb

      - name: Install APT utilities and build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev apt-utils libnss3 nss-plugin-pem ca-certificates wget libssl-dev

      - name: Install libcurl-impersonate
        run: |
          wget https://github.com/lwthiker/curl-impersonate/releases/download/v0.6.1/libcurl-impersonate-v0.6.1.x86_64-linux-gnu.tar.gz
          tar -xvf libcurl-impersonate-v0.6.1.x86_64-linux-gnu.tar.gz
          sudo mv libcurl-impersonate-chrome.so* /usr/local/lib/
          sudo mv libcurl-impersonate-ff.so* /usr/local/lib/
          sudo ldconfig

      - name: Build DEB package
        run: |
          cargo build --release
          cargo deb

      - name: Setup Repository Directory
        run: |
          mkdir -p deploy/amd64
          cp target/debian/*.deb deploy/amd64/

      - name: Import GPG Key & Sign
        run: |
          # Import secret key
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          
          cd deploy
          # 1. Scan packages and generate index for root-level flat repo
          dpkg-scanpackages amd64 /dev/null > amd64/Packages
          gzip -9c amd64/Packages > amd64/Packages.gz
          
          # 2. Scan packages and generate index for amd64-subdirectory flat repo
          cd amd64
          dpkg-scanpackages . /dev/null > Packages
          gzip -9c Packages > Packages.gz
          cd ..
          
          # 3. Create Release configuration for root-level flat repo
          cat <<EOF > aptrelease.conf
          APT::FTPArchive::Release::Origin "ajsb85";
          APT::FTPArchive::Release::Label "wayback-impersonator";
          APT::FTPArchive::Release::Suite "stable";
          APT::FTPArchive::Release::Codename "stable";
          APT::FTPArchive::Release::Architectures "amd64";
          APT::FTPArchive::Release::Components "main";
          APT::FTPArchive::Release::Description "Debian Repository for wayback-impersonator";
          EOF
          
          # Generate and sign Release files for root level
          apt-ftparchive -c aptrelease.conf release . > Release
          gpg --batch --yes --pinentry-mode loopback --passphrase "${{ secrets.GPG_PASSPHRASE }}" --clearsign -o InRelease Release
          gpg --batch --yes --pinentry-mode loopback --passphrase "${{ secrets.GPG_PASSPHRASE }}" -b -a -o Release.gpg Release
          
          # 4. Create Release configuration for amd64-subdirectory flat repo
          cat <<EOF > aptrelease-amd64.conf
          APT::FTPArchive::Release::Origin "ajsb85";
          APT::FTPArchive::Release::Label "wayback-impersonator";
          APT::FTPArchive::Release::Suite "stable";
          APT::FTPArchive::Release::Codename "stable";
          APT::FTPArchive::Release::Architectures "amd64";
          APT::FTPArchive::Release::Components "main";
          APT::FTPArchive::Release::Description "Debian Repository for wayback-impersonator (amd64)";
          EOF
          
          # Generate and sign Release files for amd64 level
          cd amd64
          apt-ftparchive -c ../aptrelease-amd64.conf release . > Release
          gpg --batch --yes --pinentry-mode loopback --passphrase "${{ secrets.GPG_PASSPHRASE }}" --clearsign -o InRelease Release
          gpg --batch --yes --pinentry-mode loopback --passphrase "${{ secrets.GPG_PASSPHRASE }}" -b -a -o Release.gpg Release
          cd ..
          
          # 5. Export public key in both binary and ASCII armored formats at root and copy to amd64
          gpg --batch --yes --export "ajsb85@firechip.dev" > archive-key.gpg
          gpg --batch --yes --armor --export "ajsb85@firechip.dev" > archive-key.asc
          cp archive-key.gpg archive-key.asc amd64/
          
          # Cleanup configs
          rm aptrelease.conf aptrelease-amd64.conf

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: deploy
          branch: gh-pages
